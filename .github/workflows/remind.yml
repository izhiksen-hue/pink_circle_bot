name: Daily Birthday Reminders

on:
  schedule:
    - cron: '0 7 * * *'  # каждый день в 10:00 по Москве (UTC+3)
  workflow_dispatch:  # можно запустить вручную

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot==20.3
      - run: python bot.py remind
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
